name: shurl

services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    command: ['postgres', '-c', 'max_connections=120', '-c', 'synchronous_commit=off']
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  clickhouse:
    image: clickhouse/clickhouse-server:26.5-alpine
    restart: unless-stopped
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:8.8.0
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    restart: unless-stopped
    deploy:
      replicas: 4
    environment:
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - ORIGIN=${BACKEND_URL}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - GOOGLE_RECAPTCHA_SECRET=${GOOGLE_RECAPTCHA_SECRET}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      redis:
        condition: service_started
      init:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=80
      - BACKEND_URL=${BACKEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  init:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: init
    environment:
      - REDIS_URL=${REDIS_URL}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./loadbalancer/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      backend:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  containers:
    image: ghcr.io/dlepaux/docker-exporter:1.4.0
    restart: unless-stopped
    user: '0'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '9713:9713'

  prometheus:
    image: prom/prometheus:v3.5.4
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - containers

  grafana:
    image: grafana/grafana:13.0.2
    restart: unless-stopped
    environment:
      - 'GF_SECURITY_ADMIN_USER=${GRAFANA_USER}'
      - 'GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/dashboards:/etc/grafana/dashboards
    ports:
      - '3030:3000'
    depends_on:
      - prometheus

volumes:
  pg_data:
  redis_data:
  clickhouse_data:
  clickhouse_logs:
  prometheus_data:
  grafana_data:
